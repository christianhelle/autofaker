name: pre-release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "!stable"
      - "!release"

env:
  VERSION: 2.0.dev${{ github.run_number }}

jobs:
  pre-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Update Version
        shell: pwsh
        run: |
          $initFile = 'pyproject.toml'
          $version = '${{ env.VERSION }}'
          $content = Get-Content $initFile
          $content | ForEach-Object { $_ -replace '^version\s*=\s*".*"$', "version = `"$version`"" } | Set-Content $initFile
          Get-Content $initFile | Write-Host
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade build
      - name: Build
        run: python -m build
      - name: Publish distribution 📦 to TestPyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/

  test-linux:
    needs: pre-release
    uses: christianhelle/autofaker/.github/workflows/test.yml@main
    with:
      os: ubuntu-latest

  test-mac:
    needs: pre-release
    uses: christianhelle/autofaker/.github/workflows/test.yml@main
    with:
      os: macos-latest

  test-windows:
    needs: pre-release
    uses: christianhelle/autofaker/.github/workflows/test.yml@main
    with:
      os: windows-latest
